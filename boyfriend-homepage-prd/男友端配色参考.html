<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>男友端 · 暖阳微光主题</title>
  <style>
    /* ========================================
       1. CSS Variables · 暖阳微光主题配色
       ======================================== */
    :root {
      /* 主色 - 暖橙 */
      --primary: #E8833A;
      --primary-dark: #D4732E;
      --primary-light: #FDE8D9;
      --primary-gradient: linear-gradient(135deg, #E8833A 0%, #D4732E 100%);

      /* 辅助色 - 深邃蓝 */
      --secondary: #2C3E6B;
      --secondary-light: #E8EDF5;

      /* 点缀色 - 暖金 */
      --gold: #D4A847;

      /* 背景色 */
      --bg-page: #FDF8F3;
      --bg-card: #FFFFFF;
      --bg-section: #F5F0EB;

      /* 文字颜色 */
      --text-primary: #3D2C1E;
      --text-secondary: #8A7A6B;
      --text-light: #C4B8AD;

      /* 功能色 */
      --color-success: #4CAF50;
      --color-warning: #FFA726;
      --color-danger: #EF5350;

      /* 阴影 & 圆角 */
      --shadow-sm: 0 2px 12px rgba(232, 131, 58, 0.08);
      --shadow-md: 0 4px 20px rgba(232, 131, 58, 0.12);
      --shadow-lg: 0 8px 32px rgba(44, 62, 107, 0.10);
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --safe-bottom: env(safe-area-inset-bottom, 16px);
    }

    /* ========================================
       2. 全局重置 & 基础样式
       ======================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #E8ECF2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ========================================
       3. 手机容器
       ======================================== */
    .phone-frame {
      width: 390px;
      max-width: 100%;
      height: 844px;
      max-height: 95vh;
      background: var(--bg-page);
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0, 0, 0, 0.03);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ========================================
       4. 状态栏
       ======================================== */
    .status-bar {
      flex-shrink: 0;
      padding: 12px 28px 8px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-page);
    }
    .status-bar .time {
      font-weight: 700;
      color: var(--text-primary);
    }
    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 13px;
    }

    /* ========================================
       5. 内容区域（滚动）
       ======================================== */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-area::-webkit-scrollbar {
      display: none;
    }

    /* ========================================
       6. 顶部问候
       ======================================== */
    .greeting-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0 16px;
    }
    .greeting-left {
      display: flex;
      flex-direction: column;
    }
    .greeting-left .hello {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .greeting-left .hello span {
      color: var(--primary);
    }
    .greeting-left .sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .greeting-left .sub .badge {
      background: var(--color-danger);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 10px;
      border-radius: 30px;
      animation: pulse-badge 2s ease-in-out infinite;
    }
    @keyframes pulse-badge {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .greeting-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--primary-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      box-shadow: 0 4px 12px rgba(232, 131, 58, 0.3);
      flex-shrink: 0;
    }

    /* ========================================
       7. 数据卡片
       ======================================== */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      padding: 16px 14px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.15s ease;
      cursor: default;
      border: 1px solid rgba(232, 131, 58, 0.04);
    }
    .stat-card:active {
      transform: scale(0.97);
    }
    .stat-card .stat-icon {
      font-size: 20px;
      margin-bottom: 4px;
      display: block;
    }
    .stat-card .stat-number {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .stat-card .stat-number.highlight-danger { color: var(--color-danger); }
    .stat-card .stat-number.highlight-warning { color: var(--color-warning); }
    .stat-card .stat-number.highlight-success { color: var(--color-success); }
    .stat-card .stat-number.highlight-secondary { color: var(--secondary); }
    .stat-card .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .stat-card .stat-sub {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ========================================
       8. 待处理订单
       ======================================== */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0 12px;
    }
    .section-header .title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .section-header .more {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .order-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .order-card {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      padding: 16px 16px 14px;
      box-shadow: var(--shadow-sm);
      border-left: 4px solid var(--primary);
      transition: all 0.15s ease;
      cursor: default;
    }
    .order-card:active {
      transform: scale(0.99);
    }
    .order-card.status-pending { border-left-color: var(--color-danger); }
    .order-card.status-cooking { border-left-color: var(--color-warning); }
    .order-card.status-done { border-left-color: var(--color-success); }

    .order-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .order-top .order-time {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 500;
    }
    .order-top .order-status-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 12px;
      border-radius: 30px;
      background: var(--bg-section);
      color: var(--text-secondary);
    }
    .order-top .order-status-tag.tag-pending {
      background: #FFE8E8;
      color: var(--color-danger);
    }
    .order-top .order-status-tag.tag-cooking {
      background: #FFF0E6;
      color: var(--color-warning);
    }
    .order-top .order-status-tag.tag-done {
      background: #E6F7EC;
      color: var(--color-success);
    }

    .order-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .order-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .order-extra {
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--bg-section);
      padding: 4px 12px;
      border-radius: 8px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .order-actions {
      display: flex;
      gap: 10px;
      margin-top: 2px;
    }
    .order-actions .btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      background: var(--bg-section);
      color: var(--text-secondary);
      transition: all 0.15s ease;
      cursor: pointer;
      text-align: center;
    }
    .order-actions .btn:active {
      transform: scale(0.96);
    }
    .order-actions .btn-primary {
      background: var(--primary-gradient);
      color: #fff;
      box-shadow: 0 4px 12px rgba(232, 131, 58, 0.25);
    }
    .order-actions .btn-primary:active {
      background: var(--primary-dark);
    }
    .order-actions .btn-success {
      background: var(--color-success);
      color: #fff;
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.25);
    }
    .order-actions .btn-danger {
      background: transparent;
      color: var(--color-danger);
      border: 1.5px solid #FFE8E8;
    }
    .order-actions .btn-secondary {
      background: var(--bg-section);
      color: var(--text-secondary);
    }

    /* ========================================
       9. 经营小报
       ======================================== */
    .report-card {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      padding: 18px 18px 16px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
      border: 1px solid rgba(232, 131, 58, 0.04);
    }
    .report-card .report-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .report-card .report-items {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .report-card .report-item {
      text-align: center;
      padding: 8px 4px;
      background: var(--bg-section);
      border-radius: 10px;
    }
    .report-card .report-item .ri-number {
      font-size: 20px;
      font-weight: 800;
      color: var(--secondary);
      display: block;
    }
    .report-card .report-item .ri-number.gold {
      color: var(--gold);
    }
    .report-card .report-item .ri-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .report-card .report-item .ri-emoji {
      font-size: 22px;
      display: block;
      margin-bottom: 2px;
    }

    /* ========================================
       10. 底部导航
       ======================================== */
    .bottom-nav {
      flex-shrink: 0;
      background: var(--bg-card);
      border-top: 1px solid #EDF2F7;
      padding: 8px 0 calc(8px + var(--safe-bottom));
      display: flex;
      justify-content: space-around;
      align-items: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .bottom-nav .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 10px;
      color: var(--text-light);
      transition: color 0.15s ease;
      cursor: pointer;
      padding: 4px 16px;
      border: none;
      background: transparent;
      font-family: inherit;
      position: relative;
    }
    .bottom-nav .nav-item .nav-icon {
      font-size: 22px;
      line-height: 1;
    }
    .bottom-nav .nav-item.active {
      color: var(--primary);
      font-weight: 600;
    }
    .bottom-nav .nav-item .nav-badge {
      position: absolute;
      top: 0;
      right: 4px;
      background: var(--color-danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
    }

    /* ========================================
       11. Toast 提示
       ======================================== */
    .toast {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(61, 44, 30, 0.85);
      color: #fff;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      white-space: nowrap;
      z-index: 99;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ========================================
       12. 响应式适配
       ======================================== */
    @media (max-width: 430px) {
      .phone-frame {
        border-radius: 28px;
        height: 95vh;
        max-height: 95vh;
      }
      .greeting-left .hello { font-size: 18px; }
      .stat-card .stat-number { font-size: 22px; }
    }
    @media (max-width: 380px) {
      .phone-frame {
        border-radius: 0;
        height: 100vh;
        max-height: 100vh;
      }
      body { padding: 0; }
    }

    .clickable { cursor: pointer; }
  </style>
</head>
<body>

<div class="phone-frame">
  <!-- ===== 状态栏 ===== -->
  <div class="status-bar">
    <span class="time" id="statusTime">16:02</span>
    <span class="status-icons">
      <span>📶</span>
      <span>📶</span>
      <span>🔋</span>
    </span>
  </div>

  <!-- ===== 滚动内容 ===== -->
  <div class="scroll-area" id="scrollArea">
    <!-- 顶部问候 -->
    <div class="greeting-section">
      <div class="greeting-left">
        <div class="hello">中午好，<span id="boyName">通途</span> 👨‍🍳</div>
        <div class="sub">
          <span>今日已服务 <strong id="todayCount">3</strong> 次</span>
          <span class="badge" id="newOrderBadge">🆕 2 个新订单</span>
        </div>
      </div>
      <div class="greeting-avatar">🧑‍🍳</div>
    </div>

    <!-- 数据卡片 -->
    <div class="stats-grid">
      <div class="stat-card clickable" data-stat="pending">
        <span class="stat-icon">🆕</span>
        <div class="stat-number highlight-danger" id="statPending">2</div>
        <div class="stat-label">待接单</div>
      </div>
      <div class="stat-card clickable" data-stat="cooking">
        <span class="stat-icon">🔥</span>
        <div class="stat-number highlight-warning" id="statCooking">1</div>
        <div class="stat-label">制作中</div>
      </div>
      <div class="stat-card clickable" data-stat="done">
        <span class="stat-icon">✅</span>
        <div class="stat-number highlight-success" id="statDone">3</div>
        <div class="stat-label">今日完成</div>
      </div>
      <div class="stat-card clickable" data-stat="avg">
        <span class="stat-icon">⏱️</span>
        <div class="stat-number highlight-secondary" id="statAvg">12</div>
        <div class="stat-label">平均出餐 <span style="font-size:11px;color:var(--text-light);">min</span></div>
      </div>
    </div>

    <!-- 待处理订单 -->
    <div class="section-header">
      <span class="title">📋 待处理订单</span>
      <span class="more">查看全部 ›</span>
    </div>
    <div class="order-list" id="orderList">
      <!-- 由 JavaScript 动态渲染 -->
    </div>

    <!-- 经营小报 -->
    <div class="report-card">
      <div class="report-title">📊 本周经营小报</div>
      <div class="report-items">
        <div class="report-item">
          <span class="ri-emoji">🍽️</span>
          <span class="ri-number" id="reportTotal">21</span>
          <span class="ri-label">服务次数</span>
        </div>
        <div class="report-item">
          <span class="ri-emoji">❤️</span>
          <span class="ri-number gold" id="reportTop" style="font-size:16px;">爱心汉堡</span>
          <span class="ri-label">女友最爱</span>
        </div>
        <div class="report-item">
          <span class="ri-emoji">🕐</span>
          <span class="ri-number gold" id="reportTime" style="font-size:16px;">12:00-13:00</span>
          <span class="ri-label">最受欢迎时段</span>
        </div>
      </div>
    </div>

    <div style="height: 8px;"></div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== 底部导航 ===== -->
  <div class="bottom-nav">
    <button class="nav-item active" data-tab="home">
      <span class="nav-icon">🏠</span>
      <span>首页</span>
    </button>
    <button class="nav-item" data-tab="orders">
      <span class="nav-icon">📦</span>
      <span>订单</span>
      <span class="nav-badge" id="orderBadge">2</span>
    </button>
    <button class="nav-item" data-tab="profile">
      <span class="nav-icon">👤</span>
      <span>我的</span>
    </button>
  </div>
</div>

<script>
  // ============================================================
  //  数据
  // ============================================================
  const ordersData = [
    { id: 1, time: '12:30', name: '爱心汉堡', desc: '牛肉饼 + 芝士 + 生菜', extra: '🥬 多放生菜', status: 'pending', statusLabel: '待接单' },
    { id: 2, time: '12:15', name: '芝士披萨', desc: '满满的芝士拉丝', extra: '🧀 芝士加倍', status: 'cooking', statusLabel: '制作中', eta: '⏱ 预计5分钟' },
    { id: 3, time: '11:50', name: '水果沙拉', desc: '新鲜水果 + 酸奶酱', extra: '', status: 'done', statusLabel: '已完成' },
  ];

  // ============================================================
  //  渲染函数
  // ============================================================
  function renderOrders() {
    const container = document.getElementById('orderList');
    if (!container) return;

    const activeOrders = ordersData.filter(o => o.status === 'pending' || o.status === 'cooking');

    if (activeOrders.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:32px 0;color:var(--text-light);font-size:14px;">🎉 暂无待处理订单，休息一下吧~</div>`;
      return;
    }

    let html = '';
    activeOrders.forEach(order => {
      const statusClass = order.status === 'pending' ? 'status-pending' : order.status === 'cooking' ? 'status-cooking' : 'status-done';
      const tagClass = order.status === 'pending' ? 'tag-pending' : order.status === 'cooking' ? 'tag-cooking' : 'tag-done';

      let actionsHtml = '';
      if (order.status === 'pending') {
        actionsHtml = `
          <div class="order-actions">
            <button class="btn btn-primary" data-action="accept" data-id="${order.id}">✅ 接单</button>
            <button class="btn btn-danger" data-action="reject" data-id="${order.id}">✖ 拒绝</button>
          </div>
        `;
      } else if (order.status === 'cooking') {
        actionsHtml = `
          <div class="order-actions">
            <button class="btn btn-success" data-action="complete" data-id="${order.id}">🍳 出餐完成</button>
          </div>
        `;
      }

      const extraHtml = order.extra ? `<div class="order-extra">📝 ${order.extra}</div>` : '';
      const etaHtml = order.eta ? `<div style="font-size:13px;color:var(--color-warning);font-weight:500;margin-bottom:6px;">${order.eta}</div>` : '';

      html += `
        <div class="order-card ${statusClass}" data-id="${order.id}">
          <div class="order-top">
            <span class="order-time">🕐 ${order.time}</span>
            <span class="order-status-tag ${tagClass}">${order.statusLabel}</span>
          </div>
          <div class="order-name">${order.name}</div>
          <div class="order-desc">${order.desc}</div>
          ${extraHtml}
          ${etaHtml}
          ${actionsHtml}
        </div>
      `;
    });

    container.innerHTML = html;

    // 事件绑定
    container.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const action = this.dataset.action;
        const id = parseInt(this.dataset.id);
        handleOrderAction(action, id);
      });
    });
  }

  // ============================================================
  //  交互处理
  // ============================================================
  function handleOrderAction(action, id) {
    const order = ordersData.find(o => o.id === id);
    if (!order) return;

    const actionMap = {
      accept: { msg: `✅ 已接单「${order.name}」，马上开始制作！`, newStatus: 'cooking', newLabel: '制作中' },
      reject: { msg: `✖ 已拒绝「${order.name}」，已通知女友。`, newStatus: 'done', newLabel: '已拒绝' },
      complete: { msg: `🍳 「${order.name}」已出餐完成！女友将收到通知 🎉`, newStatus: 'done', newLabel: '已完成' },
    };

    const config = actionMap[action];
    if (!config) return;

    if (action === 'accept') {
      order.status = 'cooking';
      order.statusLabel = '制作中';
      order.eta = '⏱ 预计8分钟';
      updateBadgeCounts();
    } else if (action === 'reject') {
      order.status = 'done';
      order.statusLabel = '已拒绝';
    } else if (action === 'complete') {
      order.status = 'done';
      order.statusLabel = '已完成';
      const doneEl = document.getElementById('statDone');
      if (doneEl) {
        const current = parseInt(doneEl.textContent) || 0;
        doneEl.textContent = current + 1;
      }
      const totalEl = document.getElementById('reportTotal');
      if (totalEl) {
        const current = parseInt(totalEl.textContent) || 0;
        totalEl.textContent = current + 1;
      }
    }

    showToast(config.msg);
    setTimeout(() => {
      renderOrders();
      updateBadgeCounts();
      updateStats();
    }, 200);
  }

  // ============================================================
  //  UI 更新辅助
  // ============================================================
  function updateBadgeCounts() {
    const pending = ordersData.filter(o => o.status === 'pending').length;
    const cooking = ordersData.filter(o => o.status === 'cooking').length;
    const badge = document.getElementById('orderBadge');
    if (badge) {
      const total = pending + cooking;
      badge.textContent = total;
      badge.style.display = total > 0 ? 'flex' : 'none';
    }
    const newBadge = document.getElementById('newOrderBadge');
    if (newBadge) {
      if (pending > 0) {
        newBadge.textContent = `🆕 ${pending} 个新订单`;
        newBadge.style.display = 'inline-block';
      } else {
        newBadge.style.display = 'none';
      }
    }
    const pendingEl = document.getElementById('statPending');
    if (pendingEl) pendingEl.textContent = pending;
    const cookingEl = document.getElementById('statCooking');
    if (cookingEl) cookingEl.textContent = cooking;
  }

  function updateStats() {
    const done = ordersData.filter(o => o.status === 'done').length;
    const doneEl = document.getElementById('statDone');
    if (doneEl) doneEl.textContent = done;
  }

  // ============================================================
  //  Toast
  // ============================================================
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      el.classList.remove('show');
    }, 2200);
  }

  // ============================================================
  //  底部导航
  // ============================================================
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      this.classList.add('active');
      const tab = this.dataset.tab;
      if (tab === 'home') showToast('🏠 已回到首页');
      else if (tab === 'orders') showToast('📦 跳转至订单列表');
      else if (tab === 'profile') showToast('👤 跳转至个人中心');
    });
  });

  // ============================================================
  //  统计卡片点击
  // ============================================================
  document.querySelectorAll('[data-stat]').forEach(card => {
    card.addEventListener('click', function() {
      const type = this.dataset.stat;
      const map = { pending: '🆕 待接单', cooking: '🔥 制作中', done: '✅ 今日完成', avg: '⏱️ 平均出餐' };
      showToast(`📊 ${map[type] || type}`);
    });
  });

  // ============================================================
  //  时间
  // ============================================================
  function updateTime() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('statusTime').textContent = `${h}:${m}`;
  }
  updateTime();
  setInterval(updateTime, 30000);

  // ============================================================
  //  初始化
  // ============================================================
  renderOrders();
  updateBadgeCounts();
  updateStats();
  console.log('🍳 男友端工作台已加载 · 暖阳微光主题');
</script>
</body>
</html>
